<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Patch's Garden</title>

  <style>
    /* -----------------------------
       GLOBAL STYLES
    ----------------------------- */

    body {
      margin: 0;
      padding: 0;
      background: #f3f3f1;
      color: #3f2350; /* dark purple */
      font-family: "Times New Roman", Times, serif;
      font-weight: normal;
    }

    a {
      color: #3f2350;
      text-decoration: underline;
    }

    a:hover {
      opacity: 0.7;
    }

    /* -----------------------------
       HEADER
    ----------------------------- */

    .header {
      text-align: center;
      margin-top: 40px;
    }

    .site-title {
      font-size: 4rem;
      margin: 0;
      letter-spacing: 1px;
      font-weight: normal;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 1rem;
    }

    /* -----------------------------
       NAVIGATION
    ----------------------------- */

    .nav {
      margin-top: 35px;
      display: flex;
      justify-content: center;
      gap: 40px;
      font-size: 1rem;
    }

    /* -----------------------------
       BLOG ENTRY
    ----------------------------- */

    .blog-container {
      width: 55%;
      margin: 100px auto;
    }

    .blog-post {
      display: flex;
      gap: 40px;
      align-items: flex-start;
    }

    .blog-image {
      width: 40%;
    }

    .blog-image img {
      width: 100%;
      height: auto;
      display: block;
    }

    .blog-content {
      width: 60%;
    }

    .blog-title {
      font-size: 2rem;
      margin-top: 0;
      margin-bottom: 20px;
      font-weight: normal;
    }

    .blog-text {
      line-height: 1.7;
      font-size: 1rem;
    }

    /* -----------------------------
       MOBILE
    ----------------------------- */

    @media (max-width: 900px) {

      .blog-container {
        width: 90%;
      }

      .blog-post {
        flex-direction: column;
      }

      .blog-image,
      .blog-content {
        width: 100%;
      }

      .site-title {
        font-size: 2.5rem;
      }

      .nav {
        gap: 20px;
        flex-wrap: wrap;
      }
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">

    <h1 class="site-title">Patch's Garden</h1>

    <div class="subtitle">
      Alec Midgley
    </div>

    <!-- NAVIGATION -->
    <nav class="nav">
      <a href="#">blog</a>
      <a href="#">photos</a>
      <a href="#">about</a>
      <a href="#">email</a>
      <a href="#">contact</a>
    </nav>

  </header>

  <!-- BLOG SECTION -->
  <main class="blog-container">

    <article class="blog-post">

      <!-- IMAGE -->
      <div class="blog-image">
        <img src="your-photo.jpg" alt="Blog image">
      </div>

      <!-- TEXT -->
      <div class="blog-content">

        <h2 class="blog-title">
          Walking Through Marrakech
        </h2>

        <div class="blog-text">
          <p>
            The streets felt endless. Dusty pink walls,
            motorbikes cutting through crowds, the smell
            of smoke and spices everywhere.
          </p>

          <p>
            I spent most of the afternoon wandering with
            my camera and getting lost intentionally.
          </p>
        </div>

      </div>

    </article>

  </main>

</body>
</html>
